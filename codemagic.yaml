# codemagic.yaml
# ExamCountdown iOS App

workflows:
  exam-countdown:
    name: Exam Countdown
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.examcountdown.app
      vars:
        XCODE_PROJECT: "ExamCountdown.xcodeproj"
        XCODE_SCHEME: "ExamCountdown"
      xcode: "latest"
      cocoapods: default

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild archive \
            -project ExamCountdown.xcodeproj \
            -scheme ExamCountdown \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$BUILD_DIR/ExamCountdown.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
